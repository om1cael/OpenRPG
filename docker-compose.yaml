services:
  mysql:
    image: mysql:8.0
    restart: always
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --ssl=0
    environment:
      MYSQL_ROOT_PASSWORD: passwordhere
      MYSQL_DATABASE: openrpg
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
  
  phpmyadmin:
    image: phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: passwordhere
    ports:
      - '8080:80'

volumes:
  mysql_data: