services:
  mysql:
    image: mysql:lts
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: passwordhere
      MYSQL_DATABASE: openrpg
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
  
  phpmyadmin:
    image: phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: passwordhere
    ports:
      - '8080:80'

volumes:
  mysql_data: